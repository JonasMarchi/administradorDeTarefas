<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="cabecalho">
        <h1>Lista de Tarefas</h1>
        <nav>
            <!-- Links de Navegação corrgidos com as âncoras -->
             <a href="#inicio">Inicio</a>
             <a href="#listaTarefas">Tarefas</a>
             <a href="#contato">Contato</a>
        </nav>
    </header>
    <!-- div#inicio.container -->
    <div id="inicio" class="container">
        <h2>Adicionar nova tarefa</h2>
        <div>
            <!-- input:text#tarefaInput -->
            <input type="text" placeholder="Digite uma tarefa" id="tarefaInput">
            <button onclick="adicionarTarefa()">Adicionar</button>
        </div>

        <ul id="listaTarefas"></ul>
    </div>

    <footer id="Contato">
        <p>&copy; 2026 SENAI. Todos os direitos reservados.</p>
    </footer>
    <script>
        let tarefas = [];
        let editandoIndex = null;
        function adicionarTarefa(){
            const input = document.getElementById('tarefaInput');
            const tarefa = input.value.trim(); // remove espaços desnecessarios
            if(tarefa){
                if(editandoIndex === null){
                    tarefas.push(tarefa); // adiciona o valor no final da lista
                }else{
                    tarefas[editandoIndex] = tarefa;
                    editandoIndex = null;
                }
                input.value = ''; // para que depois que a tarefa for adiciionada o campo do input vai voltar vazio
                atualizarLista(); // função que ainda vamos criar
            }
        }

        function removerTarefa(index){
            tarefas.splice(index, 1); // apenas 1 posição será apagada. o .splice apaga
            atualizarLista(); //funcao que ainda vamos criar
        }

        function editarTarefa(index){
            const input = document.getElementById('tarefaInput');
            input.value = tarefas[index]; //posicao da tarefa no vetor
            editandoIndex = index
        }

        function atualizarLista(){
            const lista = document.getElementById('listaTarefas');
            lista.innerHTML = '';
            tarefas.forEach((tarefa,index) => {
                const li = document.createElement('li'); //li é cada elemento de uma lista
                li.innerHTML=`${tarefa} 
                <button onclick="editarTarefa(${index})">Editar</button>
                <button onclick="removerTarefa(${index})">Remover</button>`;
                
                lista.appendChild(li);
            })
        }
    </script>
</body>
</html>
